<?xml version="1.0" encoding="UTF-8"?>
<!-- Hassan Home — Entry Card, FRONT
     Size: 5 x 7 inches at 300dpi = 1500 x 2100 px
     Bleed: 0.125" all sides (recommend trim safe = 0.25" from edge)
     Print-safe area: 4.5 x 6.5 inches centered
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="5in" height="7in"
     viewBox="0 0 1500 2100"
     preserveAspectRatio="xMidYMid meet"
     font-family="Cormorant Garamond, Times New Roman, Garamond, serif">

  <!-- background cream -->
  <rect width="1500" height="2100" fill="#F5EFE3"/>

  <!-- subtle warm radial -->
  <defs>
    <radialGradient id="warm" cx="50%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#F8F2E6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#F5EFE3" stop-opacity="1"/>
    </radialGradient>
  </defs>
  <rect width="1500" height="2100" fill="url(#warm)"/>

  <!-- Thin brass keyline frame (inset 90 from edge) -->
  <rect x="90" y="90" width="1320" height="1920" fill="none"
        stroke="#A87E3F" stroke-width="3"/>
  <!-- Inner secondary keyline -->
  <rect x="110" y="110" width="1280" height="1880" fill="none"
        stroke="#A87E3F" stroke-width="1" stroke-opacity="0.55"/>

  <!-- ORNATE BRASS CORNERS -->
  <!-- top-left -->
  <g transform="translate(90,90)" fill="none" stroke="#A87E3F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 80 Q 30 76, 60 80"/>
    <path d="M80 0 Q 76 30, 80 60"/>
    <path d="M0 80 Q 6 50, 30 36 Q 50 28, 80 30"/>
    <path d="M30 36 Q 26 20, 14 14"/>
    <circle cx="30" cy="36" r="4" fill="#A87E3F" stroke="none"/>
    <path d="M50 60 Q 60 70, 76 76" stroke-opacity="0.6"/>
  </g>
  <!-- top-right -->
  <g transform="translate(1410,90) scale(-1,1)" fill="none" stroke="#A87E3F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 80 Q 30 76, 60 80"/>
    <path d="M80 0 Q 76 30, 80 60"/>
    <path d="M0 80 Q 6 50, 30 36 Q 50 28, 80 30"/>
    <path d="M30 36 Q 26 20, 14 14"/>
    <circle cx="30" cy="36" r="4" fill="#A87E3F" stroke="none"/>
    <path d="M50 60 Q 60 70, 76 76" stroke-opacity="0.6"/>
  </g>
  <!-- bottom-left -->
  <g transform="translate(90,2010) scale(1,-1)" fill="none" stroke="#A87E3F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 80 Q 30 76, 60 80"/>
    <path d="M80 0 Q 76 30, 80 60"/>
    <path d="M0 80 Q 6 50, 30 36 Q 50 28, 80 30"/>
    <path d="M30 36 Q 26 20, 14 14"/>
    <circle cx="30" cy="36" r="4" fill="#A87E3F" stroke="none"/>
    <path d="M50 60 Q 60 70, 76 76" stroke-opacity="0.6"/>
  </g>
  <!-- bottom-right -->
  <g transform="translate(1410,2010) scale(-1,-1)" fill="none" stroke="#A87E3F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 80 Q 30 76, 60 80"/>
    <path d="M80 0 Q 76 30, 80 60"/>
    <path d="M0 80 Q 6 50, 30 36 Q 50 28, 80 30"/>
    <path d="M30 36 Q 26 20, 14 14"/>
    <circle cx="30" cy="36" r="4" fill="#A87E3F" stroke="none"/>
    <path d="M50 60 Q 60 70, 76 76" stroke-opacity="0.6"/>
  </g>

  <!-- TOP ORNAMENT — central peony with side flourish -->
  <g transform="translate(750,240)" fill="none" stroke="#A87E3F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- side scrolls -->
    <path d="M-200 0 Q -140 -10, -100 0" stroke-opacity="0.7"/>
    <path d="M-100 0 Q -90 -16, -70 -18 Q -60 -10, -70 0" />
    <path d="M200 0 Q 140 -10, 100 0" stroke-opacity="0.7"/>
    <path d="M100 0 Q 90 -16, 70 -18 Q 60 -10, 70 0" />
    <!-- peony center -->
    <circle cx="0" cy="0" r="10"/>
    <path d="M0 -10 Q -8 -22, 0 -34 Q 8 -22, 0 -10 Z" fill="#A87E3F" fill-opacity="0.25"/>
    <path d="M0 10 Q -8 22, 0 34 Q 8 22, 0 10 Z" fill="#A87E3F" fill-opacity="0.25"/>
    <path d="M-10 0 Q -22 -8, -34 0 Q -22 8, -10 0 Z" fill="#A87E3F" fill-opacity="0.25"/>
    <path d="M10 0 Q 22 -8, 34 0 Q 22 8, 10 0 Z" fill="#A87E3F" fill-opacity="0.25"/>
    <!-- diagonal petals -->
    <path d="M-7 -7 Q -16 -20, -24 -24" stroke-opacity="0.7"/>
    <path d="M7 -7 Q 16 -20, 24 -24" stroke-opacity="0.7"/>
    <path d="M-7 7 Q -16 20, -24 24" stroke-opacity="0.7"/>
    <path d="M7 7 Q 16 20, 24 24" stroke-opacity="0.7"/>
  </g>

  <!-- EYEBROW -->
  <text x="750" y="350" text-anchor="middle"
        font-family="-apple-system, Helvetica, Arial, sans-serif"
        font-size="22" letter-spacing="8" fill="#A87E3F">PLEASE COME IN</text>

  <!-- WELCOME LINE -->
  <text x="750" y="430" text-anchor="middle"
        font-size="46" font-style="italic" fill="#1A2540" opacity="0.85">Welcome to the</text>

  <!-- TITLE -->
  <text x="750" y="540" text-anchor="middle"
        font-size="98" font-weight="500" fill="#1A2540"
        letter-spacing="2">Hassan Home</text>

  <!-- ESTABLISHED -->
  <text x="750" y="600" text-anchor="middle"
        font-family="-apple-system, Helvetica, Arial, sans-serif"
        font-size="20" letter-spacing="8" fill="#A87E3F">ESTABLISHED 2024</text>

  <!-- divider flourish under title -->
  <g transform="translate(750,650)" fill="none" stroke="#A87E3F" stroke-width="2" stroke-linecap="round">
    <line x1="-180" y1="0" x2="-50" y2="0" stroke-opacity="0.55"/>
    <line x1="50" y1="0" x2="180" y2="0" stroke-opacity="0.55"/>
    <path d="M-40 0 Q -20 -14, 0 0 Q 20 14, 40 0" />
    <circle cx="0" cy="0" r="4" fill="#A87E3F" stroke="none"/>
  </g>

  <!-- INSTRUCTION COPY -->
  <text x="750" y="760" text-anchor="middle"
        font-size="38" font-style="italic" fill="#1A2540">Tap your phone here,</text>
  <text x="750" y="808" text-anchor="middle"
        font-size="38" font-style="italic" fill="#1A2540">or scan with your camera</text>

  <!-- QR PLACEHOLDER GROUP — gets replaced by real QR by Python script -->
  <!-- We center a 700x700 area around (750, 1240) -->
  <rect id="qr-bg" x="380" y="900" width="740" height="740"
        fill="#F8F2E6" stroke="#A87E3F" stroke-width="2"/>

  <!-- Decorative chinoiserie inner border around the QR slot -->
  <rect x="396" y="916" width="708" height="708"
        fill="none" stroke="#A87E3F" stroke-width="0.8" stroke-opacity="0.5"/>

  <!-- QR image will be embedded here as base64 PNG -->
  <image id="qr-image" x="420" y="940" width="660" height="660"
         href="data:image/png;base64,"/>

  <!-- URL label under QR -->
  <text x="750" y="1740" text-anchor="middle"
        font-family="-apple-system, Helvetica, Arial, sans-serif"
        font-size="22" letter-spacing="3" fill="#A87E3F">thehassanfamily.com</text>

  <!-- NFC hint line -->
  <g transform="translate(750,1820)" text-anchor="middle">
    <text font-family="-apple-system, Helvetica, Arial, sans-serif"
          font-size="20" letter-spacing="5" fill="#1A2540" opacity="0.65">NFC TAG BEHIND THIS CARD</text>
  </g>

  <!-- bottom signature flourish -->
  <g transform="translate(750,1920)" fill="none" stroke="#A87E3F" stroke-width="2" stroke-linecap="round">
    <line x1="-120" y1="0" x2="-30" y2="0" stroke-opacity="0.55"/>
    <line x1="30" y1="0" x2="120" y2="0" stroke-opacity="0.55"/>
    <circle cx="0" cy="0" r="3" fill="#A87E3F" stroke="none"/>
  </g>

  <!-- footer signature -->
  <text x="750" y="1970" text-anchor="middle"
        font-size="30" font-style="italic" fill="#1A2540" opacity="0.85">The Hassans &#183; Temecula</text>

</svg>
