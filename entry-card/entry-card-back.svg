<?xml version="1.0" encoding="UTF-8"?>
<!-- Hassan Home — Entry Card, BACK
     Size: 5 x 7 inches at 300dpi = 1500 x 2100 px
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="5in" height="7in"
     viewBox="0 0 1500 2100"
     preserveAspectRatio="xMidYMid meet"
     font-family="Cormorant Garamond, Times New Roman, Garamond, serif">

  <!-- background cream -->
  <rect width="1500" height="2100" fill="#F5EFE3"/>
  <defs>
    <radialGradient id="warm" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#F8F2E6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#F5EFE3" stop-opacity="1"/>
    </radialGradient>
  </defs>
  <rect width="1500" height="2100" fill="url(#warm)"/>

  <!-- brass keyline frames -->
  <rect x="90" y="90" width="1320" height="1920" fill="none"
        stroke="#A87E3F" stroke-width="3"/>
  <rect x="110" y="110" width="1280" height="1880" fill="none"
        stroke="#A87E3F" stroke-width="1" stroke-opacity="0.55"/>

  <!-- corners (same as front) -->
  <g transform="translate(90,90)" fill="none" stroke="#A87E3F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 80 Q 30 76, 60 80"/>
    <path d="M80 0 Q 76 30, 80 60"/>
    <path d="M0 80 Q 6 50, 30 36 Q 50 28, 80 30"/>
    <circle cx="30" cy="36" r="4" fill="#A87E3F" stroke="none"/>
  </g>
  <g transform="translate(1410,90) scale(-1,1)" fill="none" stroke="#A87E3F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 80 Q 30 76, 60 80"/>
    <path d="M80 0 Q 76 30, 80 60"/>
    <path d="M0 80 Q 6 50, 30 36 Q 50 28, 80 30"/>
    <circle cx="30" cy="36" r="4" fill="#A87E3F" stroke="none"/>
  </g>
  <g transform="translate(90,2010) scale(1,-1)" fill="none" stroke="#A87E3F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 80 Q 30 76, 60 80"/>
    <path d="M80 0 Q 76 30, 80 60"/>
    <path d="M0 80 Q 6 50, 30 36 Q 50 28, 80 30"/>
    <circle cx="30" cy="36" r="4" fill="#A87E3F" stroke="none"/>
  </g>
  <g transform="translate(1410,2010) scale(-1,-1)" fill="none" stroke="#A87E3F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 80 Q 30 76, 60 80"/>
    <path d="M80 0 Q 76 30, 80 60"/>
    <path d="M0 80 Q 6 50, 30 36 Q 50 28, 80 30"/>
    <circle cx="30" cy="36" r="4" fill="#A87E3F" stroke="none"/>
  </g>

  <!-- CENTRAL CHINOISERIE MEDALLION -->
  <g transform="translate(750,1050)" fill="none" stroke="#1A2540" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- outer ring -->
    <circle r="320" stroke="#A87E3F" stroke-width="2"/>
    <circle r="300" stroke="#A87E3F" stroke-width="0.8" stroke-opacity="0.6"/>
    <!-- inner ginger jar form -->
    <path d="M-110 240
             Q -160 200, -160 100
             Q -160 -20, -100 -100
             L -100 -140
             L 100 -140
             L 100 -100
             Q 160 -20, 160 100
             Q 160 200, 110 240 Z"
          fill="#F5EFE3" stroke="#1A2540" stroke-width="2"/>
    <!-- lid -->
    <path d="M-80 -140 Q -80 -180, 0 -180 Q 80 -180, 80 -140 Z" fill="#F5EFE3" stroke="#1A2540" stroke-width="2"/>
    <circle cx="0" cy="-184" r="6" fill="#1A2540" stroke="none"/>
    <!-- band top -->
    <path d="M-130 -90 Q -90 -100, -50 -90 Q 0 -78, 50 -90 Q 90 -100, 130 -90" stroke-width="2"/>
    <path d="M-130 -70 Q 0 -78, 130 -70" stroke-width="1" stroke-opacity="0.6"/>
    <!-- floral cluster center -->
    <g>
      <circle r="20"/>
      <path d="M0 -22 Q -16 -8, 0 0 Q 16 -8, 0 -22 Z" fill="#1A2540" fill-opacity="0.55"/>
      <path d="M0 22 Q -16 8, 0 0 Q 16 8, 0 22 Z" fill="#1A2540" fill-opacity="0.55"/>
      <path d="M-22 0 Q -8 -16, 0 0 Q -8 16, -22 0 Z" fill="#1A2540" fill-opacity="0.45"/>
      <path d="M22 0 Q 8 -16, 0 0 Q 8 16, 22 0 Z" fill="#1A2540" fill-opacity="0.45"/>
      <circle r="6" fill="#B83A3A" stroke="none"/>
    </g>
    <!-- side leaves -->
    <g fill="#1A2540" fill-opacity="0.4" stroke="#1A2540" stroke-width="1.2">
      <path d="M-70 30 Q -50 10, -30 30 Q -50 50, -70 30 Z"/>
      <path d="M70 30 Q 50 10, 30 30 Q 50 50, 70 30 Z"/>
      <path d="M-60 80 Q -40 60, -20 80 Q -40 100, -60 80 Z"/>
      <path d="M60 80 Q 40 60, 20 80 Q 40 100, 60 80 Z"/>
    </g>
    <!-- vines flowing down -->
    <path d="M-80 130 Q -90 170, -80 210" stroke-width="1.5"/>
    <path d="M80 130 Q 90 170, 80 210" stroke-width="1.5"/>
    <!-- bottom band -->
    <path d="M-130 220 Q 0 210, 130 220" stroke-width="2"/>
    <path d="M-120 232 Q -60 240, 0 232 Q 60 240, 120 232" stroke-width="1" stroke-opacity="0.6"/>
  </g>

  <!-- TOP TEXT -->
  <text x="750" y="380" text-anchor="middle"
        font-family="-apple-system, Helvetica, Arial, sans-serif"
        font-size="22" letter-spacing="8" fill="#A87E3F">WITH WARM THANKS</text>

  <text x="750" y="490" text-anchor="middle"
        font-size="60" font-style="italic" fill="#1A2540">for being here</text>

  <!-- divider flourish -->
  <g transform="translate(750,560)" fill="none" stroke="#A87E3F" stroke-width="2" stroke-linecap="round">
    <line x1="-160" y1="0" x2="-40" y2="0" stroke-opacity="0.5"/>
    <line x1="40" y1="0" x2="160" y2="0" stroke-opacity="0.5"/>
    <path d="M-30 0 Q -15 -10, 0 0 Q 15 10, 30 0" />
    <circle cx="0" cy="0" r="3" fill="#A87E3F" stroke="none"/>
  </g>

  <!-- BOTTOM SIGNATURE -->
  <text x="750" y="1700" text-anchor="middle"
        font-size="48" font-style="italic" fill="#1A2540">The Hassans</text>
  <text x="750" y="1770" text-anchor="middle"
        font-family="-apple-system, Helvetica, Arial, sans-serif"
        font-size="22" letter-spacing="8" fill="#A87E3F">TEMECULA &#183; CALIFORNIA</text>

  <!-- tiny bottom flourish -->
  <g transform="translate(750,1860)" fill="none" stroke="#A87E3F" stroke-width="1.6" stroke-linecap="round">
    <line x1="-80" y1="0" x2="-20" y2="0" stroke-opacity="0.55"/>
    <line x1="20" y1="0" x2="80" y2="0" stroke-opacity="0.55"/>
    <circle cx="0" cy="0" r="3" fill="#A87E3F" stroke="none"/>
  </g>

</svg>
